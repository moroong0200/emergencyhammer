<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMERGENCY HAMMER</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Arial, sans-serif;
height:100vh;
}

.page{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#home{
display:flex;
}

#menu{
display:none;
flex-direction:column;
gap:35px;
}

.logo{
font-size:40px;
letter-spacing:10px;
}

.text{
margin-top:30px;
letter-spacing:8px;
font-size:13px;
}

button{
margin-top:60px;
background:none;
border:none;
color:white;
border-bottom:1px solid white;
padding-bottom:8px;
letter-spacing:5px;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
font-size:18px;
letter-spacing:8px;
}

</style>

</head>


<body>

<div class="page" id="home">

<div>

<div class="logo">
EMERGENCY HAMMER
</div>

<div class="text">
BREAK YOUR FIT.
</div>

<button onclick="enterSite()">
ENTER
</button>

</div>

</div>


<div class="page" id="menu">

<a href="#">SHOP</a>
<a href="#">LOOKBOOK</a>
<a href="#">ABOUT</a>
<a href="#">INSTAGRAM</a>

</div>


<script>

function enterSite(){

document.getElementById("home").style.display="none";

document.getElementById("menu").style.display="flex";

}

</script>


</body>
</html>
