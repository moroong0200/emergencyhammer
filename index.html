<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMERGENCY HAMMER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Helvetica Neue,Arial,sans-serif;
height:100vh;
overflow:hidden;
}


.page{
height:100vh;
width:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}


/* HOME */

.logo{
font-size:42px;
letter-spacing:12px;
}

.tagline{
margin-top:35px;
font-size:13px;
letter-spacing:8px;
opacity:.8;
}


button{
margin-top:60px;
background:none;
border:none;
color:#fff;
border-bottom:1px solid #fff;
padding-bottom:8px;
letter-spacing:6px;
cursor:pointer;
}



/* MENU CATEGORY PRODUCT */

#menu,
#category,
#product{

display:none;
flex-direction:column;
gap:35px;
position:relative;

}



.menu-item,
.category-item{

color:#fff;
font-size:18px;
letter-spacing:8px;
cursor:pointer;
transition:.3s;

}


.menu-item:hover,
.category-item:hover{

opacity:.5;
letter-spacing:12px;

}



/* BACK */

.back{

position:absolute;
top:40px;
left:40px;
font-size:22px;
cursor:pointer;

}



/* PRODUCT */

.product-name{

font-size:24px;
letter-spacing:8px;

}


.image{

width:260px;
height:330px;
border:1px solid #333;
margin:35px auto;

display:flex;
align-items:center;
justify-content:center;

font-size:10px;
letter-spacing:3px;
opacity:.5;

}


.info{

font-size:13px;
letter-spacing:4px;
line-height:2.5;

}



.arrow{

position:absolute;
right:40px;
top:50%;
font-size:35px;
cursor:pointer;

}


.left-arrow{

position:absolute;
left:40px;
top:50%;
font-size:35px;
cursor:pointer;

}



.year{

position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:10px;
letter-spacing:5px;
opacity:.5;

}



@media(max-width:600px){

.logo{
font-size:27px;
letter-spacing:7px;
}


.product-name{
font-size:18px;
}

}

</style>

</head>


<body>


<!-- HOME -->

<div class="page" id="home">

<div>

<div class="logo">
EMERGENCY HAMMER
</div>


<div class="tagline">
BREAK YOUR FIT.
</div>


<button onclick="openMenu()">
ENTER
</button>


</div>

</div>



<!-- MENU -->

<div class="page" id="menu">


<div class="back" onclick="backHome()">
←
</div>


<div class="menu-item" onclick="openCategory()">
SHOP
</div>


<div class="menu-item">
LOOKBOOK
</div>


<div class="menu-item">
ABOUT
</div>


<div class="menu-item">
INSTAGRAM
</div>


</div>



<!-- CATEGORY -->

<div class="page" id="category">


<div class="back" onclick="backMenu()">
←
</div>


<div class="category-item" onclick="openTop()">
TOP
</div>


<div class="category-item" onclick="openBottom()">
BOTTOM
</div>


</div>



<!-- PRODUCT -->

<div class="page" id="product">


<div class="back" onclick="backCategory()">
←
</div>


<div class="left-arrow" onclick="prevProduct()">
←
</div>


<div>


<div class="product-name" id="productName">
</div>


<div class="image">
PRODUCT IMAGE
</div>


<div class="info">

₩49,000<br>
BLACK<br>
SIZE S / M / L / XL

</div>


</div>


<div class="arrow" onclick="nextProduct()">
→
</div>


</div>
<div class="year">
EST. 2026
</div>



<script>


let products = [];

let index = 0;



const tops = [

"GRAPHIC TEE 001",

"HAMMER LOGO TEE 002",

"BREAK FIT TEE 003"

];



const bottoms = [

"HAMMER PANTS 001",

"UTILITY PANTS 002",

"DENIM PANTS 003"

];





function openMenu(){

document.getElementById("home").style.display="none";

document.getElementById("menu").style.display="flex";

}



function backHome(){

document.getElementById("menu").style.display="none";

document.getElementById("home").style.display="flex";

}




function openCategory(){

document.getElementById("menu").style.display="none";

document.getElementById("category").style.display="flex";

}



function backMenu(){

document.getElementById("category").style.display="none";

document.getElementById("menu").style.display="flex";

}





function openTop(){

products = tops;

index = 0;

showProduct();

}



function openBottom(){

products = bottoms;

index = 0;

showProduct();

}




function showProduct(){

document.getElementById("category").style.display="none";

document.getElementById("product").style.display="flex";


document.getElementById("productName").innerHTML =
products[index];

}




function nextProduct(){

index++;


if(index >= products.length){

index = 0;

}


document.getElementById("productName").innerHTML =
products[index];

}




function prevProduct(){

index--;


if(index < 0){

index = products.length - 1;

}


document.getElementById("productName").innerHTML =
products[index];

}




function backCategory(){

document.getElementById("product").style.display="none";

document.getElementById("category").style.display="flex";

}



</script>


</body>

</html>
