<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMERGENCY HAMMER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Helvetica Neue, Arial, sans-serif;
height:100vh;
overflow:hidden;
}


/* 공통 */

.page{
height:100vh;
width:100%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}


/* 첫 화면 */

#home{
display:flex;
animation:fade 1.5s ease;
}

.logo{
font-size:42px;
letter-spacing:12px;
font-weight:600;
}

.tagline{
margin-top:35px;
font-size:13px;
letter-spacing:8px;
opacity:.8;
}

button{
margin-top:65px;
background:none;
border:none;
color:white;
font-size:12px;
letter-spacing:6px;
cursor:pointer;
border-bottom:1px solid white;
padding-bottom:8px;
}


/* 메뉴 화면 */

#menu{
display:none;
flex-direction:column;
gap:35px;
position:relative;
animation:fade .8s ease;
}


#menu a{

color:white;
text-decoration:none;
font-size:18px;
letter-spacing:8px;
transition:.3s;

}


#menu a:hover{

opacity:.5;
letter-spacing:12px;

}


/* 뒤로가기 */

.back{

position:absolute;
top:40px;
left:40px;
font-size:22px;
color:white;
cursor:pointer;
letter-spacing:0;

}


/* 아래 */

.year{

position:absolute;
bottom:35px;
width:100%;
text-align:center;
font-size:10px;
letter-spacing:5px;
opacity:.5;

}


/* 애니메이션 */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}


/* 모바일 */

@media(max-width:600px){

.logo{
font-size:27px;
letter-spacing:7px;
}

.tagline{
font-size:10px;
letter-spacing:5px;
}

#menu a{
font-size:15px;
}

}


</style>

</head>



<body>


<!-- 첫 화면 -->

<div class="page" id="home">

<div>

<div class="logo">
EMERGENCY HAMMER
</div>

<div class="tagline">
BREAK YOUR FIT.
</div>


<button onclick="enterSite()">
ENTER
</button>


</div>

</div>




<!-- 메뉴 화면 -->

<div class="page" id="menu">


<div class="back" onclick="goBack()">
←
</div>


<a href="#">
SHOP
</a>

<a href="#">
LOOKBOOK
</a>

<a href="#">
ABOUT
</a>

<a href="#">
INSTAGRAM
</a>


</div>




<div class="year">
EST. 2026
</div>




<script>


function enterSite(){

document.getElementById("home").style.display="none";

document.getElementById("menu").style.display="flex";

}



function goBack(){

document.getElementById("menu").style.display="none";

document.getElementById("home").style.display="flex";

}


</script>


</body>
</html>
