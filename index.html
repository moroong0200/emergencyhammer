*{

body{

Helvetica Neue,

/* =====================
GLOBAL
===================== */


.page{

height:100vh;

width:100%;

animation:pageIn .6s ease;

}



#transition{

position:fixed;

width:100%;

height:100vh;

background:#fff;

z-index:9999;

transform:scaleY(0);

transform-origin:bottom;

}







/* =====================
LOADING
===================== */


#loading{

position:fixed;

width:100%;

height:100vh;

background:#000;

flex-direction:column;

align-items:center;

.loading-logo{

}



.loading-sub{

}








/* =====================
INTRO
===================== */

font-size:42px;

letter-spacing:14px;

}



.tagline{

margin-top:40px;

font-size:12px;

letter-spacing:10px;

opacity:0;

animation:fadeIn 1.5s forwards;

animation-delay:.5s;

}



.enter{

margin-top:70px;

border-bottom:1px solid white;

padding-bottom:15px;

font-size:11px;

letter-spacing:8px;

cursor:pointer;

opacity:0;

animation:fadeIn 1.5s forwards;

animation-delay:1s;

transition:.4s;

}



.enter:hover{

letter-spacing:15px;

}



.year{

position:absolute;

bottom:40px;

font-size:10px;

letter-spacing:7px;

opacity:.5;

}







/* =====================
MENU
===================== */


.menu-item{

margin:25px;

font-size:16px;

letter-spacing:8px;

cursor:pointer;

opacity:0;

animation:menuIn .8s forwards;

transition:.4s;

}



.menu-item:hover{

letter-spacing:15px;

}



.menu-item:nth-child(1){

animation-delay:.1s;

}



.menu-item:nth-child(2){

animation-delay:.3s;

}



.menu-item:nth-child(3){

animation-delay:.5s;

}



.menu-item:nth-child(4){

animation-delay:.7s;

}







/* =====================
BACK
===================== */


.back{

position:absolute;

top:40px;

left:40px;

font-size:28px;

cursor:pointer;

transition:.3s;

}



.back:hover{

transform:translateX(-8px);

}
/* PART 1-2 수정본 */


/* =====================
SHOP
===================== */


.category-title{

position:absolute;

top:80px;

font-size:11px;

letter-spacing:8px;

opacity:.5;

}



.category-item{

font-size:18px;

letter-spacing:10px;

margin:30px;

cursor:pointer;

transition:.4s;

}



.category-item:hover{

letter-spacing:18px;

}







/* =====================
PRODUCT LIST
===================== */


.product-list{

display:flex;

gap:25px;

}



.product-card{

width:220px;

cursor:pointer;

transition:.5s;

}



.product-card:hover{

transform:translateY(-10px);

}



.product-thumb{

height:280px;

border:1px solid #222;

display:flex;

align-items:center;

justify-content:center;

font-size:9px;

letter-spacing:4px;

}



.product-card-name{

margin-top:20px;

font-size:11px;

letter-spacing:4px;

}



.product-card-price{

margin-top:10px;

font-size:10px;

opacity:.6;

}







/* =====================
SHOP MOBILE MODE
===================== */


.mobile-next{

display:none;

}





@media(max-width:768px){



.product-list{


width:90vw;

height:65vh;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;


}



.product-card{


display:none;

width:85vw;

}



.product-card.active{


display:block;


}




.product-thumb{


height:55vh;


}



.mobile-next{


display:block;

margin-top:30px;

text-align:center;

}



}







/* =====================
LOOKBOOK
===================== */


.look-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

width:500px;

}



.look-item{

aspect-ratio:1;

border:1px solid #222;

display:flex;

align-items:center;

justify-content:center;

font-size:9px;

letter-spacing:3px;

transition:.4s;

}



.look-item:hover{

transform:scale(1.05);

}








/* MOBILE LOOKBOOK 유지 */


@media(max-width:768px){



.look-grid{


display:flex;

width:90vw;

align-items:center;

justify-content:center;

overflow:hidden;


}



.look-item{

width:85vw;

height:55vh;

aspect-ratio:auto;


}



.look-item.active{

}


}

<script>
// PART 3-1 수정본



// =====================
// PRODUCT DATA
// =====================


const products = {


new:[

{
name:"EMERGENCY TEE 001",
price:49000
},

{
name:"HAMMER LOGO TEE 002",
price:52000
},

{
name:"BREAK FIT TEE 003",
price:55000
}

],



top:[

{
name:"EMERGENCY TEE 001",
price:49000
},

{
name:"HAMMER LOGO TEE 002",
price:52000
},

{
name:"BREAK FIT TEE 003",
price:55000
}

],



bottom:[

{
name:"HAMMER PANTS 001",
price:79000
},

{
name:"UTILITY PANTS 002",
price:85000
},

{
name:"DENIM PANTS 003",
price:89000
}

]


};






let currentProducts=[];

let currentIndex=0;

let cart=[];

let selectedSize="";

let quantity=1;

let lookPage=0;







// =====================
// PAGE CONTROL
// =====================


function hideAll(){


document.querySelectorAll(".page")

.forEach(function(page){


page.style.display="none";


});


}







function movePage(id){


hideAll();



let target=document.getElementById(id);



if(target){


target.style.display="flex";


}



}








// =====================
// INTRO / MENU
// =====================


function openMenu(){


movePage("menu");


}




function openIntro(){


movePage("intro");


}








// =====================
// SHOP
// =====================


function openShop(){


movePage("shop");


}







function openList(type){


currentProducts=products[type];


currentIndex=0;




document.getElementById("listTitle").innerHTML=

type.toUpperCase();





let box=document.getElementById("productsBox");



let html="";






currentProducts.forEach(function(item,index){



html+=`


<div class="product-card ${index===0 ? "active":""}"

onclick="openDetail(${index})">



<div class="product-thumb">

IMAGE

</div>




<div class="product-card-name">

${item.name}

</div>




<div class="product-card-price">

₩${item.price}

</div>



</div>


`;



});



box.innerHTML=html;



movePage("productList");



}








// =====================
// MOBILE SHOP NEXT
// =====================


function nextProduct(){



let cards=document.querySelectorAll(".product-card");



if(cards.length===0)return;



cards[currentIndex].classList.remove("active");



currentIndex++;



if(currentIndex>=cards.length){


currentIndex=0;


}



cards[currentIndex].classList.add("active");



}








function backList(){


movePage("productList");


}
// PART 3-2 수정본



// =====================
// DETAIL
// =====================


function openDetail(index){


currentIndex=index;


let item=currentProducts[index];



document.getElementById("detailName").innerHTML=item.name;



document.getElementById("detailPrice").innerHTML=

"₩"+item.price;



quantity=1;


document.getElementById("qty").innerHTML=quantity;



selectedSize="";



movePage("detail");


}







function selectSize(btn){


document.querySelectorAll("#detail button")

.forEach(function(button){


button.classList.remove("active");


});



btn.classList.add("active");



selectedSize=btn.innerHTML;



}







function changeQty(num){


quantity+=num;



if(quantity<1){


quantity=1;


}



document.getElementById("qty").innerHTML=quantity;



}









// =====================
// CART
// =====================


function addDetailCart(){



if(selectedSize===""){


alert("SELECT SIZE");


return;


}





let item=currentProducts[currentIndex];




let exist=cart.find(function(c){


return c.name===item.name && c.size===selectedSize;


});





if(exist){


exist.qty+=quantity;


}else{


cart.push({


name:item.name,

price:item.price,

size:selectedSize,

qty:quantity


});


}



updateCart();


}








function updateCart(){


let count=0;



cart.forEach(function(item){


count+=item.qty;


});



document.getElementById("cartIcon").innerHTML=

"CART ("+count+")";


}








function openCart(){


movePage("cart");



let box=document.getElementById("cartList");



let html="";



let total=0;





cart.forEach(function(item,index){



total+=item.price*item.qty;




html+=`


<div class="cart-item">


<div class="cart-image">

IMAGE

</div>



<div>


${item.name}

<br>

SIZE ${item.size}

<br>

₩${item.price}



<div class="qty">


<button onclick="changeCartQty(${index},-1)">

-

</button>



${item.qty}



<button onclick="changeCartQty(${index},1)">

+

</button>



</div>



</div>




<div class="remove"

onclick="removeCart(${index})">


×


</div>



</div>


`;



});





if(cart.length===0){


html="CART IS EMPTY";


}





box.innerHTML=html;



document.getElementById("total").innerHTML=

"TOTAL ₩"+total;



}








function changeCartQty(index,num){


cart[index].qty+=num;



if(cart[index].qty<=0){


cart.splice(index,1);


}



updateCart();


openCart();



}








function removeCart(index){


cart.splice(index,1);



updateCart();


openCart();



}








function buyDetail(){


addDetailCart();


checkout();


}







function checkout(){


movePage("order");


}









// =====================
// LOOKBOOK 9 ITEMS
// =====================


let looks=[


"LOOK 01",

"LOOK 02",

"LOOK 03",

"LOOK 04",

"LOOK 05",

"LOOK 06",

"LOOK 07",

"LOOK 08",

"LOOK 09"


];






function openLookbook(){


lookPage=0;


renderLookbook();


movePage("lookbook");


}







function renderLookbook(){


let grid=document.getElementById("lookGrid");



let html="";



looks.forEach(function(item,index){



if(index===lookPage){


html+=`


<div class="look-item active">

${item}

</div>


`;



}else{


html+=`


<div class="look-item">

${item}

</div>


`;



}



});




grid.innerHTML=html;



}







function nextLook(){


lookPage++;



if(lookPage>=looks.length){


lookPage=0;


}



renderLookbook();



}







function prevLook(){


lookPage--;



if(lookPage<0){


lookPage=looks.length-1;


}



renderLookbook();



}







function mobileNextLook(){


nextLook();


}









// =====================
// ABOUT
// =====================


function openAbout(){


movePage("about");


}







// =====================
// START FIX
// =====================


window.addEventListener("load",function(){


setTimeout(function(){


document.getElementById("loading").style.display="none";


document.getElementById("intro").style.display="flex";


},2500);


});



</script>
